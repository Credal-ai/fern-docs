instances:
  - url: credal.docs.buildwithfern.com
    custom-domain: docs.credal.ai
    edit-this-page:
      github:
        owner: Credal-ai
        repo: fern-docs
        branch: main
title: Credal | Documentation
check:
  rules:
    broken-links: error
products:
  - display-name: User Guide
    path: ./docs/user-guide.yml
    icon: fa-solid fa-book
  - display-name: API Reference
    path: ./apis/v0/docs/docs.yml
    versions:
      - display-name: v0
        path: ./apis/v0/docs/docs.yml
      - display-name: v1
        path: ./apis/v1/docs/docs.yml
        availability: beta
default-language: python
navbar-links:
  - type: secondary
    text: System Status
    url: https://status.credal.ai
  - type: filled
    text: Start using Credal
    url: https://app.credal.ai/signin
colors:
  accentPrimary:
    light: "#228be6"
favicon: docs/assets/favicon.png
logo:
  href: https://docs.credal.ai/
  light: docs/assets/credal-dark-logo.svg
  dark: docs/assets/credal-light-logo.svg
  height: 30
css: ./styles.css
settings:
  hide-404-page: true
  http-snippets: false
redirects:
  - source: /getting-started/data-integrations
    destination: /getting-started/data-sources-action-providers
  - source: /api-reference/document-catalog/upload-document-contents
    destination: /api-reference
  - source: /user-guide/platform/administration/audit-log-data-exports
    destination: /user-guide/platform/administration/data-warehouse-integration
  - source: /user-guide/platform/agent-builder/configuration/add-connectors/document-collections
    destination: /user-guide/platform/agent-builder/configuration/add-connectors/document-collections/overview
  - source: /user-guide/platform/agent-builder/evaluating-your-agent
    destination: /user-guide/platform/agent-builder/evaluating-your-agent/overview
  - source: /user-guide/platform/agent-builder/publishing-agents/microsoft-teams
    destination: /user-guide/microsoft-teams
  - source: /user-guide/platform/agent-builder/publishing-agents/microsoft-teams-setup
    destination: /user-guide/microsoft-teams
  - source: /user-guide/platform/agent-builder/publishing-agents/versions
    destination: /user-guide/platform/agent-builder/publishing-agents/versions-forking
  - source: /user-guide/platform/integrations/data-sources-action-providers
    destination: /user-guide/platform/agent-builder/configuration/add-connectors/overview
  - source: /user-guide/platform/integrations/metadata-and-smart-filtering/ai-entity-extraction-beta
    destination: /user-guide/platform/agent-builder/configuration/add-connectors/document-collections/ai-entity-extraction-beta
  - source: /user-guide/platform/integrations/metadata-and-smart-filtering/collection-schemas
    destination: /user-guide/platform/agent-builder/configuration/add-connectors/document-collections/collection-schemas
  - source: /user-guide/platform/integrations/metadata-and-smart-filtering/smart-filtering-beta
    destination: /user-guide/platform/agent-builder/configuration/add-connectors/document-collections/smart-filtering-beta
  - source: /user-guide/platform/mcp-servers/mcp-server-builder/create-new-server
    destination: /user-guide/platform/mcp-server-builder/create-a-new-server
  - source: /user-guide/platform/mcp-servers/overview
    destination: /user-guide/platform/mcp-server-builder/overview
